services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-p2p_fileshare}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-p2p_fileshare}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Force container storage dir
      DATA_DIR: /data
      # Use internal docker DNS for DB
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-p2p_fileshare}?sslmode=disable
      # Recommended defaults for server
      P2P_ENABLE_MDNS: "false"
      P2P_LISTEN_ADDRS: /ip4/0.0.0.0/tcp/${P2P_PORT:-4001}
    ports:
      - "${HTTP_PORT:-8080}:8080"
      - "${P2P_PORT:-4001}:${P2P_PORT:-4001}/tcp"
    volumes:
      - data:/data

  migrate:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-p2p_fileshare}?sslmode=disable
    entrypoint: ["/app/p2p-fileshare-migrate"]
    command: ["up"]

volumes:
  pgdata:
  data:

